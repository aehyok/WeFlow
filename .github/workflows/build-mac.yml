name: Build macOS Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 2.1.1)"
        required: false

permissions:
  contents: write

jobs:
  build-mac:
    strategy:
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-14

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION=""
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
          fi

          if [[ -n "$VERSION" ]]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync package version
        if: steps.version.outputs.version != ''
        shell: bash
        run: |
          echo "Syncing package.json version to ${{ steps.version.outputs.version }}"
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Generate macOS app icon
        shell: bash
        run: |
          rm -rf build/icon.iconset build/icon.icns
          mkdir -p build/icon.iconset

          sips -z 16 16 public/logo.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32 public/logo.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 public/logo.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64 public/logo.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 public/logo.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256 public/logo.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 public/logo.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512 public/logo.png --out build/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 public/logo.png --out build/icon.iconset/icon_512x512.png
          sips -z 1024 1024 public/logo.png --out build/icon.iconset/icon_512x512@2x.png

          iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Build frontend and Electron code
        run: |
          npx tsc
          npx vite build

      - name: Build macOS installer
        run: npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac*.yml
          if-no-files-found: error

  release:
    needs:
      - build-mac
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
